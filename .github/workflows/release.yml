name: Wails Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger build on any new version tags (e.g., v1.0.0)

permissions:
  contents: write # Required to create/upload release assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            platform: windows/amd64
            output_name: vtu-result-scraper.exe
            archive_name: vtu-result-scraper-windows-amd64.zip
          - name: Linux
            os: ubuntu-latest
            platform: linux/amd64
            output_name: vtu-result-scraper
            archive_name: vtu-result-scraper-linux-amd64.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Set up development runtimes ──────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install system dependencies (Linux-only) ─────────────────
      - name: Install GTK/WebKit Headers (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential

      # ── Install Wails CLI ───────────────────────────────────────
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ── Build Application ───────────────────────────────────────
      - name: Tidy Go Modules
        run: go mod tidy

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Standalone Binary via Wails
        run: wails build -platform ${{ matrix.platform.platform }} -clean

      # ── Rename & Archive assets ──────────────────────────────────
      - name: Rename Output Binary
        shell: bash
        run: |
          mv build/bin/result-scraper* build/bin/${{ matrix.platform.output_name }}

      - name: Compress Binary (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/${{ matrix.platform.output_name }} -DestinationPath ${{ matrix.platform.archive_name }}

      - name: Compress Binary (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        shell: bash
        run: |
          tar -czvf ${{ matrix.platform.archive_name }} -C build/bin ${{ matrix.platform.output_name }}

      # ── Upload to GitHub Release ─────────────────────────────────
      - name: Create & Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.platform.archive_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
